name: CI

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-14
          - ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.6.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.7.1
          run_install: false

      - name: Install dotfiles
        run: ./install

      - name: Install Claude defaults
        run: |
          make claude
          jq empty ~/.claude/settings.json
          {
            echo "## Claude settings"
            echo
            echo '```json'
            jq . ~/.claude/settings.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Restore skills
        run: |
          make skills-restore | tee /tmp/skills-restore.log
          {
            echo "## Skills restored"
            echo
            echo "| Skill | Source | Status |"
            echo "| --- | --- | --- |"
            awk '/✓$/{print "| " $2 " | `" $3 "` | ✅ |"} /✗$/{print "| " $2 " | `" $3 "` | ❌ |"}' /tmp/skills-restore.log
          } | tee -a "$GITHUB_STEP_SUMMARY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update skills
        run: |
          make skills-update 2>&1 | tee /tmp/skills-update.log
          {
            echo "## Skills update"
            echo
            echo "<details><summary><code>skills update --global</code></summary>"
            echo
            echo '```'
            sed $'s/\x1b\\[[0-9;]*[a-zA-Z]//g' /tmp/skills-update.log | tr -d '\r'
            echo '```'
            echo
            echo "</details>"
          } | tee -a "$GITHUB_STEP_SUMMARY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log skill lock
        run: |
          jq empty ~/.agents/.skill-lock.json
          jq . ~/.agents/.skill-lock.json

      - name: List skills
        run: |
          npx skills ls -g 2>&1 | tee /tmp/skills-ls.log
          {
            echo "## Skills installed"
            echo
            echo '```'
            sed $'s/\x1b\\[[0-9;]*[a-zA-Z]//g' /tmp/skills-ls.log | tr -d '\r'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  discover-plugins:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.discover.outputs.plugins }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: discover
        run: |
          plugins=$(ls -d claude/local-plugins/*/package.json 2>/dev/null | xargs -I{} dirname {} | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "plugins=$plugins" >> $GITHUB_OUTPUT

  claude-plugins:
    needs: discover-plugins
    if: ${{ needs.discover-plugins.outputs.plugins != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.7"

      - name: Cache Bun dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Test ${{ matrix.plugin }}
        working-directory: claude/local-plugins/${{ matrix.plugin }}
        run: bun install && bun run typecheck && bun test

  karabiner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.7"

      - name: Typecheck karabiner
        working-directory: karabiner
        run: bun install && bunx tsc --noEmit

