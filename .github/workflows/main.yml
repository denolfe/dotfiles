name: CI

on: [push]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-14
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Checkout submodules
        shell: bash
        run: |
          auth_header="$(git config --local --get http.https://github.com/.extraheader)"
          git submodule sync --recursive
          git -c "http.extraheader=$auth_header" -c protocol.version=2 submodule update --init --force --recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.6.0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.1
          run_install: false

      - name: Install dotfiles
        run: ./install

  discover-plugins:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.discover.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          plugins=$(ls -d claude/local-plugins/*/package.json 2>/dev/null | xargs -I{} dirname {} | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "plugins=$plugins" >> $GITHUB_OUTPUT

  test-plugin:
    needs: discover-plugins
    if: ${{ needs.discover-plugins.outputs.plugins != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Test ${{ matrix.plugin }}
        working-directory: claude/local-plugins/${{ matrix.plugin }}
        run: bun install && bun run typecheck && bun test

