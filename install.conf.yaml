- defaults:
    link:
      relink: true
      create: true

- clean: ['~', '~/bin']

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  -
    command: 'if [ "$(uname)" = "Darwin" ]; then ./macos/setup-homebrew.sh; fi'
    description: Installing Homebrew and Essential Packages (macOS only)
    stdout: true
  -
    command: 'if [ "$(uname)" = "Linux" ]; then ./linux/setup-tools.sh; fi'
    description: Installing CLI tools via mise (Linux devbox only)
    stdout: true
  -
    description: Downloading vim-plug to ~/.vim/autoload/plug.vim
    command: curl -fLo ~/.vim/autoload/plug.vim --create-dirs https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
    stdout: true

- link:
    # ~/.dotfiles: ''

    ~/.vimrc: vim/vimrc
    ~/.config/nvim:
      path: nvim
      force: true

    ~/.zshrc:
      path: zsh/zshrc.zsh
      force: true
    ~/.oh-my-zsh: zsh/oh-my-zsh
    ~/.zgenom: zsh/zgenom
    ~/.config/mise/config.toml:
      path: zsh/mise.toml
      if: '[ ! -e ~/.config/mise/config.toml ]'
    ~/.hushlogin: zsh/hushlogin

    ~/.prettierrc.js:
      path: node/prettierrc.js

    ~/.config/fastfetch:
      path: fastfetch
      force: true

    ~/.config/ghostty:
      path: ghostty
      force: true

    ~/Library/Preferences/glow:
      if: '[ `uname` = Darwin ]'
      path: glow
      force: true

    ~/bin:
      glob: true
      path: scripts/*
      relink: true

    ~/.claude:
      glob: true
      path: claude/*
      exclude: ['claude/node_modules', 'claude/skills'] # skills handled below
      relink: true

    # Link skills individually, allows skills cli to link into skills dir
    ~/.claude/skills:
      glob: true
      path: claude/skills/*
      relink: true

    ~/.agents/.skill-lock.json:
      path: agents/.skill-lock.json
      force: true

    ~/.pi/agent/extensions:
      glob: true
      path: pi/extensions/*.ts
      relink: true

    ~/.pi/agent/skills:
      glob: true
      path: pi/skills/*
      relink: true

    ~/.pi/agent/themes:
      glob: true
      path: pi/themes/*.json
      relink: true

    ~/.config/hunk/config.toml:
      path: hunk/config.toml
      force: true

    # VS Code Linux
    ~/.config/Code/User:
      if: '[[ `uname` = Linux ]]'
      glob: true
      path: vscode/linux/*.json
      force: true

    # VS Code MacOS
    ~/Library/Application Support/Code/User:
      if: '[ `uname` = Darwin ]'
      glob: true
      path: vscode/macos/*.json
      force: true

    ~/Library/Application Support/Code/User/snippets:
      if: '[ `uname` = Darwin ]'
      path: vscode/snippets
      force: true

    # VS Code MacOS Insiders
    ~/Library/Application Support/Code - Insiders/User:
      if: '[ `uname` = Darwin ]'
      glob: true
      path: vscode/macos/*.json
      force: true

    ~/.tmux.conf:
      path: tmux/tmux.conf
      force: true

    ~/Library/Application Support/com.colliderli.iina/input_conf/YouTube.conf:
      if: '[ `uname` = Darwin ]'
      path: iina/YouTube.conf
      force: true

- shell:
  -
    command: ./git/set-gitconfig.sh
    description: Configuring Git
    stdout: true
    quiet: false
