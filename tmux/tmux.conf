# tmux config — emulates zellij modal bindings
# Requires tmux >= 3.2

# ─── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,ghostty:RGB"
set -s escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g mouse on
setw -g mode-keys vi
# set -s extended-keys on               # required for Ctrl+. and other CSI-u keys
set -g extended-keys-format csi-u
set -as terminal-features ',*:extkeys'
set -as terminal-features ',*:hyperlinks'  # OSC 8 passthrough (tmux 3.4+)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off

# Window naming — show git repo root basename, fall back to cwd basename
set -g automatic-rename on
set -g automatic-rename-format "#(cd '#{pane_current_path}' && basename \"$(git rev-parse --show-toplevel 2>/dev/null || pwd)\")"
set -wg allow-rename off

# Prefix kept on default C-b so plugins that assume a prefix work.
# All workflow bindings remain no-prefix/modal (zellij-style); prefix is
# reserved for plugin/session ops only.
set -g prefix C-b

# ─── Modal entry points (no-prefix, like zellij Ctrl+<mode>) ──────────────────
bind -n C-p switch-client -T pane-mode
bind -n C-. switch-client -T tab-mode
bind -n C-n switch-client -T resize-mode
bind -n C-s copy-mode                  # zellij Scroll mode == tmux copy-mode

# Lock mode (zellij Ctrl+g) — swap to empty key-table so all -n bindings pass through
bind -n C-g set -g key-table off \; refresh-client -S \; display "🔒 LOCKED — C-g to unlock"
bind -T off C-g set -g key-table root \; refresh-client -S \; display "🔓 unlocked"

# Quick actions (no mode needed — match zellij Alt-bindings)
bind -n M-n split-window -h -c "#{pane_current_path}"
bind -n M-h if -F '#{pane_at_left}'   'previous-window' 'select-pane -L'
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l if -F '#{pane_at_right}'  'next-window'     'select-pane -R'
bind -n M-[ previous-window
bind -n M-] next-window
bind -n M-= resize-pane -R 5 \; resize-pane -D 3
bind -n M-- resize-pane -L 5 \; resize-pane -U 3
# Alt+f intentionally NOT bound — let it pass through (forward-word in shell)

# Floating pane analog — tmux-floax (persistent scratch session in a popup)
bind -n M-\; run-shell '~/.tmux/plugins/tmux-floax/scripts/floax.sh'

# Help / keybind hints (zellij-forgot analog)
bind -n C-y display-popup -E -w 80% -h 80% \
  "tmux list-keys | less"

# Tab switcher (room analog) — requires `sesh` + fzf, falls back to choose-tree
if-shell "command -v sesh" \
  "bind -n C-Space display-popup -E -w 60% -h 60% 'sesh connect \"\$(sesh list -t -c | fzf-tmux -p 60%,60% --no-sort)\"'" \
  "bind -n C-Space choose-tree -Zw"

# ─── pane-mode (zellij Ctrl+p) ────────────────────────────────────────────────
bind -T pane-mode h select-pane -L
bind -T pane-mode j select-pane -D
bind -T pane-mode k select-pane -U
bind -T pane-mode l select-pane -R
bind -T pane-mode Left  select-pane -L
bind -T pane-mode Down  select-pane -D
bind -T pane-mode Up    select-pane -U
bind -T pane-mode Right select-pane -R
bind -T pane-mode p     select-pane -t :.+
# last-pane after swap makes focus follow the swapped content
bind -T pane-mode H       swap-pane -t '{left-of}'  \; last-pane
bind -T pane-mode J       swap-pane -t '{down-of}' \; last-pane
bind -T pane-mode K       swap-pane -t '{up-of}'   \; last-pane
bind -T pane-mode L       swap-pane -t '{right-of}'\; last-pane
bind -T pane-mode S-Left  swap-pane -t '{left-of}'  \; last-pane
bind -T pane-mode S-Down  swap-pane -t '{down-of}' \; last-pane
bind -T pane-mode S-Up    swap-pane -t '{up-of}'   \; last-pane
bind -T pane-mode S-Right swap-pane -t '{right-of}'\; last-pane
bind -T pane-mode n     split-window -h -c "#{pane_current_path}"
bind -T pane-mode d     split-window -v -c "#{pane_current_path}"
bind -T pane-mode r     split-window -h -c "#{pane_current_path}"
bind -T pane-mode x     kill-pane
bind -T pane-mode f     resize-pane -Z                  ; # zellij fullscreen toggle
bind -T pane-mode z     resize-pane -Z
bind -T pane-mode w     display-popup -E "tmux list-panes -a"
bind -T pane-mode c     command-prompt -p "rename pane:" "select-pane -T '%%'"
bind -T pane-mode Space if -F '#{==:#{@last-layout},main-vertical}' {
  set -w main-pane-width 66%
  select-layout main-vertical
  set -w @last-layout main-vertical-66
} {
  if -F '#{==:#{@last-layout},main-vertical-66}' {
    select-layout even-horizontal
    set -w @last-layout even-horizontal
  } {
    set -w main-pane-width 50%
    select-layout main-vertical
    set -w @last-layout main-vertical
  }
}
bind -T pane-mode m     select-pane -m
bind -T pane-mode M     join-pane
bind -T pane-mode "!"   break-pane
bind -T pane-mode Tab   last-pane
bind -T pane-mode i     display-panes
bind -T pane-mode s     run-shell '~/.dotfiles/tmux/sync_panes_cwd.sh "#{pane_current_path}"'
bind -T pane-mode Escape switch-client -T root
bind -T pane-mode Enter  switch-client -T root
bind -T pane-mode q      switch-client -T root

# ─── tab-mode (zellij Ctrl+. → tmux windows) ──────────────────────────────────
bind -T tab-mode n new-window -c "#{pane_current_path}"
bind -T tab-mode x kill-window
bind -T tab-mode r command-prompt -p "rename window:" "rename-window '%%'"
bind -T tab-mode h previous-window
bind -T tab-mode l next-window
bind -T tab-mode Left  previous-window
bind -T tab-mode Right next-window
bind -T tab-mode H swap-window -t -1\; select-window -t -1
bind -T tab-mode L swap-window -t +1\; select-window -t +1
bind -T tab-mode S-Left  swap-window -t -1\; select-window -t -1
bind -T tab-mode S-Right swap-window -t +1\; select-window -t +1
bind -T tab-mode 1 select-window -t :1
bind -T tab-mode 2 select-window -t :2
bind -T tab-mode 3 select-window -t :3
bind -T tab-mode 4 select-window -t :4
bind -T tab-mode 5 select-window -t :5
bind -T tab-mode 6 select-window -t :6
bind -T tab-mode 7 select-window -t :7
bind -T tab-mode 8 select-window -t :8
bind -T tab-mode 9 select-window -t :9
bind -T tab-mode Tab last-window
bind -T tab-mode s   choose-tree -Zw
bind -T tab-mode b   break-pane
bind -T tab-mode f   command-prompt -p "find window:" "find-window '%%'"
bind -T tab-mode "." command-prompt -p "move window to:" "move-window -t '%%'"
bind -T tab-mode Escape switch-client -T root
bind -T tab-mode Enter  switch-client -T root
bind -T tab-mode q      switch-client -T root

# ─── resize-mode (zellij Ctrl+n) ──────────────────────────────────────────────
bind -T resize-mode h resize-pane -L 5 \; switch-client -T resize-mode
bind -T resize-mode j resize-pane -D 3 \; switch-client -T resize-mode
bind -T resize-mode k resize-pane -U 3 \; switch-client -T resize-mode
bind -T resize-mode l resize-pane -R 5 \; switch-client -T resize-mode
bind -T resize-mode Left  resize-pane -L 5 \; switch-client -T resize-mode
bind -T resize-mode Down  resize-pane -D 3 \; switch-client -T resize-mode
bind -T resize-mode Up    resize-pane -U 3 \; switch-client -T resize-mode
bind -T resize-mode Right resize-pane -R 5 \; switch-client -T resize-mode
bind -T resize-mode "=" resize-pane -R 5 \; resize-pane -D 3 \; switch-client -T resize-mode
bind -T resize-mode "+" resize-pane -R 5 \; resize-pane -D 3 \; switch-client -T resize-mode
bind -T resize-mode "-" resize-pane -L 5 \; resize-pane -U 3 \; switch-client -T resize-mode
bind -T resize-mode Escape switch-client -T root
bind -T resize-mode Enter  switch-client -T root
bind -T resize-mode q      switch-client -T root

# ─── session-mode (prefix b, then key) ────────────────────────────────────────
bind b switch-client -T session-mode
bind -T session-mode w choose-tree -Zs
bind -T session-mode s choose-tree -Zs
bind -T session-mode d detach-client
bind -T session-mode n command-prompt -p "new session:" "new-session -s '%%'"
bind -T session-mode r command-prompt -p "rename session:" "rename-session '%%'"
bind -T session-mode x confirm-before -p "kill session? (y/n)" kill-session
bind -T session-mode S run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh'
bind -T session-mode R run-shell '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh'
bind -T session-mode Escape switch-client -T root
bind -T session-mode Enter  switch-client -T root
bind -T session-mode q      switch-client -T root

# ─── copy-mode (zellij Scroll mode) ───────────────────────────────────────────
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down-and-cancel  # exit copy-mode when wheel reaches bottom

# copy-on-select with mouse (zellij parity)
set -g @copy_on_select 1

# ─── Appearance — VS Code Dark+ (matches zellij/config.kdl palette) ───────────
# Palette: bg=#1e1e1e fg=#cccccc gray=#666666 green=#23d18b blue=#2471c8
#          magenta=#d670d6 yellow=#e5e511

set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1e1e1e,fg=#cccccc"
# Full pane frames (zellij pane_frames parity) — title above every pane
set -g pane-border-status top
set -g pane-border-indicators colour
set -g pane-border-format " #{?pane_active,#[fg=#23d18b],#[fg=#888888]}#{?#{!=:#{pane_title},#{host_short}},#{pane_title},#{pane_current_command}} #[default]"
set -g status-left-length 60
set -g status-right-length 100

# Pane borders — green active, gray inactive (zellij parity)
set -g pane-border-lines single
set -g pane-border-style        'fg=#666666,bg=default'
set -g pane-active-border-style '#{?window_zoomed_flag,fg=#e5e511#,bold,fg=#23d18b},bg=default'

# Messages
set -g message-style         "bg=#23d18b,fg=#1e1e1e"
set -g message-command-style "bg=#2471c8,fg=#1e1e1e"

# Mode/copy-mode highlight
setw -g mode-style "bg=#d670d6,fg=#1e1e1e"

# ─── Plugins (tpm) ────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'roosta/tmux-pop'
set -g @tmux-pop-color 'colour235'  # subtle near-bg gray

# Floating pane — persistent scratch session in a popup
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-width  '70%'
set -g @floax-height '70%'
set -g @floax-border-color '#23d18b'
set -g @floax-text-color   '#cccccc'
set -g @floax-change-path 'true'
set -g @floax-title 'floax'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'

# ─── Window tabs (rounded pill, zellij VS Code Dark) ──────────────────────────
set -g window-status-separator " "
set -g window-status-format         "#[fg=##3b3d41,bg=#1e1e1e]#[fg=#cccccc,bg=##3b3d41] #I #[fg=#888888,bg=#2a2a2a] #W #[fg=#2a2a2a,bg=#1e1e1e]"
set -g window-status-current-format "#[fg=#2471c8,bg=#1e1e1e]#[fg=#1e1e1e,bg=#2471c8] #I #[fg=#cccccc,bg=#3a3a3a] #W #[fg=#3a3a3a,bg=#1e1e1e]"

# ─── Status bar content ───────────────────────────────────────────────────────
# Left: mode-indicator bar (recolors by key-table) + zoom badge
set -g status-left "#{?client_prefix,#[fg=#1e1e1e#,bg=#e5e511#,bold] ⌨ PREFIX #[default] ,}#{?#{==:#{client_key_table},pane-mode},#[fg=#2471c8]▌ ,#{?#{==:#{client_key_table},tab-mode},#[fg=#d670d6]▌ ,#{?#{==:#{client_key_table},resize-mode},#[fg=#e5e511]▌ ,#{?#{==:#{client_key_table},session-mode},#[fg=#23d18b]▌ ,}}}}#{?window_zoomed_flag,#[fg=#1e1e1e#,bg=#e5e511#,bold] ⛶ ZOOM #[fg=#e5e511#,bg=#1e1e1e]#[default] ,}"

# Right: session
set -g status-right "#[fg=#23d18b,bg=#1e1e1e]#[fg=#1e1e1e,bg=#23d18b]  #[fg=#cccccc,bg=#3a3a3a] #S #[fg=#3a3a3a,bg=#1e1e1e]"

# TPM must run last so plugins can mutate final options like status-right.
# tmux-continuum injects its autosave hook there.
run '~/.tmux/plugins/tpm/tpm'
